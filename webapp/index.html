<!DOCTYPE html>
<html>
<head>
    <title>Engine Health Monitor</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- THREE JS -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/RGBELoader.js"></script>
    
    <!-- POST PROCESSING -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
</head>
<body>

<!-- CONTROL PANEL -->
<div class="control-panel">
    <button id="btnBody">Toggle Engine Body</button>
    <button id="btnDetails">Toggle Engine Details</button>
    <button onclick="showRealEngine()">Real Engine</button>
    <button onclick="startAutoTest()">Auto Test</button>
    <button id="btnSound" onclick="toggleSound()" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);">Sound: OFF</button>
    <button onclick="toggleThermal()" style="background: linear-gradient(135deg, #e74c3c, #c0392b);">Thermal Vision</button>
    <button onclick="toggleXRay()" style="background: linear-gradient(135deg, #3498db, #2980b9);">X-Ray Vision</button>
    <button onclick="toggleFaultMarkers()" style="background: linear-gradient(135deg, #e67e22, #d35400);">Toggle Fault Marker</button>
    <!-- 1. ADD THIS BUTTON inside your .control-panel div -->
    <button onclick="toggleVisualConsole()" style="background: linear-gradient(135deg, #34495e, #2c3e50);">Toggle Console</button>



    <div class="slider-container">
        <label>Environment Rotation</label>
        <input type="range" id="rotationSlider" min="0" max="360" value="0">
    </div>
</div>

<canvas id="scene"></canvas>

<!-- GLASS STATUS BOX -->
<div class="status-box" id="statusBox">
    <div class="mc-header">
        <h2>ENGINE HEALTH</h2>
        <div class="live-indicator"><span class="blink-dot"></span> LIVE</div>
    </div>

    <div class="mc-main">
        <div class="mc-state-info">
            <span class="mc-label">OPERATIONAL STATE</span>
            <span id="stateValue" class="mc-value">STANDBY</span>
        </div>
    </div>

    <div class="mc-rul-section">
        <div class="mc-rul-header">
            <!-- TEXT CHANGED HERE -->
            <span class="mc-label">Remaining Useful Life</span>
            <span id="rulPercent" class="mc-percent">100%</span>
        </div>
        
        <!-- Progress Bar -->
        <div class="mc-bar-bg">
            <div id="rulFill" class="mc-bar-fill" style="width: 100%"></div>
        </div>

        <!-- Value -->
        <div class="mc-rul-value-row">
            <span id="rulVal" class="mc-big-number">--</span>
            <span class="mc-unit">CYCLES</span>
        </div>
        <p class="mc-help">1 Cycle ≈ 1 Flight Hour</p>
    </div>

        <div style="margin-top: 15px; border-top: 1px solid rgba(0, 255, 255, 0.3); padding-top: 10px;">
            <span class="mc-label">AI LOG ANALYSIS WITH NLP</span>
            <div id="nlp-log-text" style="color: #00ffff; font-size: 13px; margin-top: 5px; font-family: monospace;">
                > System initializing...
            </div>
        </div>

    
</div>

<!-- LEGEND -->
<div class="legend">
    <h3>Health Legend</h3>
    <div class="legend-item"><span class="dot green"></span> GOOD</div>
    <div class="legend-item"><span class="dot yellow"></span> WARNING</div>
    <div class="legend-item"><span class="dot red"></span> CRITICAL</div>
</div>

<!-- AUDIO ELEMENTS -->
<audio id="soundEngine" loop src="sounds/engine_hum.mp3" preload="auto"></audio>
<audio id="soundWarning" loop src="sounds/warning.mp3" preload="auto"></audio>
<audio id="soundAlarm" loop src="sounds/alarm.mp3" preload="auto"></audio>



<script src="js/viewer.js"></script>

<!-- VISUAL CONSOLE -->
<!-- 2. ADD THIS DIV at the very bottom, before </body> -->
<div id="visual-console" style="display: none; position: fixed; bottom: 20px; left: 20px; width: 450px; height: 250px; background: rgba(0,0,0,0.95); border: 1px solid #00ffff; color: #00ff00; font-family: monospace; font-size: 13px; padding: 10px; overflow-y: auto; z-index: 9999; border-radius: 5px; box-shadow: 0 0 15px rgba(0,255,255,0.3);">
    <div style="color: #00ffff; margin-bottom: 5px; border-bottom: 1px solid #00ffff; padding-bottom: 5px;">LIVE SYSTEM LOG:</div>
    <div id="log-content"></div>
</div>

</body>
</html>
